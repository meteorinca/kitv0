<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transistor Faucet Analogy</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>The Transistor / Faucet Analogy</h1>
        <p>A small input current (Base/Valve) controls a much larger current (Collector to Emitter / Main Water Flow).
        </p>
    </header>

    <main class="demo-container">
        <div class="panel">
            <h2>Water Faucet</h2>
            <div class="svg-container">
                <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
                    <rect id="water-flow" x="110" y="100" width="0" height="200" fill="#00e5ff" opacity="0.8" />
                    <rect id="water-inlet" x="110" y="0" width="40" height="100" fill="#00e5ff" opacity="0.8" />

                    <path d="M 90 0 L 90 100 L 170 100 L 170 0" fill="none" stroke="#ffffff" stroke-width="6" />
                    <path d="M 90 100 L 90 300" fill="none" stroke="#ffffff" stroke-width="6" />
                    <path d="M 170 100 L 170 300" fill="none" stroke="#ffffff" stroke-width="6" />

                    <g id="valve-assembly">
                        <rect id="valve-gate" x="100" y="90" width="60" height="20" fill="#ff2a2a" />
                        <line x1="40" y1="100" x2="100" y2="100" stroke="#ff2a2a" stroke-width="6" />
                        <circle cx="40" cy="100" r="15" fill="#ff2a2a" />
                    </g>

                    <text x="130" y="25" fill="#aaa" font-size="12" text-anchor="middle">Main Supply (Collector)</text>
                    <text x="40" y="70" fill="#aaa" font-size="12" text-anchor="middle">Knob (Base)</text>
                    <text x="130" y="280" fill="#aaa" font-size="12" text-anchor="middle">Spout (Emitter)</text>
                </svg>
            </div>
        </div>

        <div class="panel">
            <h2>NPN Transistor</h2>
            <div class="svg-container">
                <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
                    <line id="base-flow" x1="20" y1="150" x2="80" y2="150" stroke="#ff2a2a" stroke-width="0"
                        opacity="0.5" />

                    <path id="main-flow" d="M 140 0 L 140 120 L 140 300" fill="none" stroke="#00e5ff" stroke-width="0"
                        opacity="0.5" />

                    <circle cx="110" cy="150" r="60" fill="none" stroke="#555" stroke-width="4" />
                    <line x1="80" y1="110" x2="80" y2="190" stroke="#fff" stroke-width="6" />
                    <line x1="20" y1="150" x2="80" y2="150" stroke="#fff" stroke-width="4" />
                    <line x1="140" y1="20" x2="140" y2="110" stroke="#fff" stroke-width="4" />
                    <line x1="140" y1="20" x2="80" y2="130" stroke="#fff" stroke-width="4" />

                    <line x1="80" y1="170" x2="140" y2="280" stroke="#fff" stroke-width="4" />
                    <line x1="140" y1="280" x2="140" y2="190" stroke="#fff" stroke-width="4" />

                    <polygon points="120,245 145,260 130,225" fill="#fff" />

                    <text x="160" y="30" fill="#aaa" font-size="12">Collector</text>
                    <text x="20" y="135" fill="#aaa" font-size="12">Base</text>
                    <text x="160" y="270" fill="#aaa" font-size="12">Emitter</text>
                </svg>
            </div>
        </div>
    </main>

    <div class="controls">
        <label for="control-slider">Input Signal (Base Current / Valve Openness)</label>
        <input type="range" id="control-slider" min="0" max="100" value="0">
        <div class="status-readout">Flow: <span id="flow-percentage">0</span>%</div>
    </div>

    <script src="app.js"></script>
</body>

</html>
