<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Log – Articles</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

  <style>
    /* ── Design Tokens (same as Python Academy) ── */
    :root {
      --bg-deep:       #0a0e1a;
      --bg-primary:    #0f1323;
      --bg-secondary:  #151a30;
      --bg-elevated:   #1a2040;
      --bg-surface:    #1e2548;
      --bg-hover:      #252d55;
      --teal:          #22d1c3;
      --teal-dim:      #1a9e94;
      --teal-glow:     rgba(34, 209, 195, 0.25);
      --gold:          #f5c842;
      --gold-dim:      #c9a535;
      --gold-glow:     rgba(245, 200, 66, 0.2);
      --green:         #4ade80;
      --green-glow:    rgba(74, 222, 128, 0.2);
      --red:           #f87171;
      --red-glow:      rgba(248, 113, 113, 0.2);
      --purple:        #a78bfa;
      --purple-glow:   rgba(167, 139, 250, 0.2);
      --blue:          #60a5fa;
      --text-primary:  #e8ecf4;
      --text-secondary:#8b95b0;
      --text-tertiary: #5a647e;
      --text-muted:    #3d4560;
      --border:        rgba(255, 255, 255, 0.06);
      --border-active: rgba(34, 209, 195, 0.3);
      --font-sans:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono:     'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --nav-h:         52px;
      --radius-sm:     6px;
      --radius-md:     10px;
      --radius-lg:     14px;
      --ease-out:      cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-deep);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
    input { font-family: inherit; }
    a { color: var(--teal); text-decoration: none; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

    /* ── Top bar ── */
    .top-nav {
      height: var(--nav-h);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-logo { font-size: 1.4rem; }
    .nav-title {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--teal), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-subtitle {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      margin-left: 8px;
    }

    /* ── Main layout ── */
    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
      position: relative;
    }

    /* Reading Progress Bar */
    .progress-bar-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: transparent;
      z-index: 200;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--teal);
      transition: width 0.1s ease-out;
    }

    /* Sidebar */
    .sidebar {
      width: 300px;
      min-width: 260px;
      background: var(--bg-primary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 20px 20px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
    }
    .chapter-list {
      list-style: none;
      padding: 0 12px 20px;
    }
    .chapter-item {
      display: flex;
      flex-direction: column;
      margin-bottom: 6px;
    }
    .chapter-link {
      display: block;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.2s;
      text-decoration: none;
    }
    .chapter-link:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .chapter-link.active {
      background: var(--bg-elevated);
      color: var(--teal);
      box-shadow: inset 0 0 0 1px var(--border-active);
    }
    .chapter-desc {
      font-size: 0.72rem;
      color: var(--text-tertiary);
      margin: -4px 0 0 12px;
      padding-bottom: 4px;
      line-height: 1.4;
    }

    /* Main content area */
    .content-panel {
      flex: 1;
      background: var(--bg-deep);
      overflow-y: auto;
      padding: 32px 40px;
      scroll-behavior: smooth;
    }

    /* Table of Contents (Right Sidebar) */
    .toc-panel {
      width: 240px;
      min-width: 200px;
      background: var(--bg-deep);
      border-left: 1px solid var(--border);
      padding: 24px 20px;
      overflow-y: auto;
      display: none; /* hidden by default, shown via media query or JS */
    }
    @media (min-width: 1100px) {
      .toc-panel {
        display: block;
      }
    }
    .toc-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
      margin-bottom: 16px;
    }
    .toc-list {
      list-style: none;
    }
    .toc-list li {
      margin-bottom: 8px;
    }
    .toc-link {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
      display: block;
      line-height: 1.4;
    }
    .toc-link:hover {
      color: var(--teal);
    }
    .toc-link.active {
      color: var(--teal);
      font-weight: 600;
    }
    .toc-h3 {
      margin-left: 12px;
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }
    .content-header {
      margin-bottom: 28px;
    }
    .content-title {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1.2;
    }
    .loading-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }

    /* Rendered Markdown */
    .markdown-body {
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--text-secondary);
      max-width: 780px;
      opacity: 0;
      transition: opacity 0.3s ease-in;
    }
    .markdown-body.loaded {
      opacity: 1;
    }
    .markdown-body h1 { font-size: 2rem; margin-bottom: 16px; color: var(--text-primary); }
    .markdown-body h2 { font-size: 1.5rem; margin-top: 36px; margin-bottom: 16px; color: var(--text-primary); }
    .markdown-body h3 { font-size: 1.25rem; margin-top: 28px; margin-bottom: 12px; color: var(--text-primary); }
    .markdown-body p { margin-bottom: 20px; }
    .markdown-body strong { color: var(--text-primary); font-weight: 600; }
    .markdown-body code {
      font-family: var(--font-mono);
      font-size: 0.9em;
      background: rgba(255,255,255, 0.08);
      padding: 3px 6px;
      border-radius: var(--radius-sm);
      color: var(--teal);
    }
    .markdown-body pre {
      background: #0d111d;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      overflow-x: auto;
      margin: 20px 0;
    }
    
    /* Chapter Navigation */
    .chapter-nav {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }
    .chapter-nav button {
      padding: 12px 20px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
      flex: 1;
      text-align: center;
    }
    .chapter-nav button:hover:not(:disabled) {
      background: var(--bg-hover);
      border-color: var(--teal-dim);
      color: var(--teal);
    }
    .chapter-nav button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .markdown-body pre code {
      background: transparent;
      padding: 0;
      color: var(--text-primary);
    }
    .markdown-body blockquote {
      border-left: 4px solid var(--teal);
      padding: 8px 16px;
      margin: 16px 0;
      background: rgba(34, 209, 195, 0.05);
      color: var(--text-secondary);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .markdown-body ul, .markdown-body ol {
      margin-left: 24px;
      margin-bottom: 16px;
    }
    .markdown-body li { margin-bottom: 6px; }
    .markdown-body a { color: var(--teal); text-decoration: underline; }
    .markdown-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* Footer status bar */
    .status-bar {
      height: 32px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 0.7rem;
      color: var(--text-tertiary);
      flex-shrink: 0;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        min-width: 0;
        max-height: 35vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .workspace { flex-direction: column; }
      .content-panel { padding: 20px 18px; }
      .content-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <!-- Top navigation -->
  <header class="top-nav">
    <div class="nav-brand">
      <span class="nav-logo">📖</span>
      <span class="nav-title">Mission Log</span>
      <span class="nav-subtitle">Articles & Notes</span>
    </div>
    <div></div>
  </header>

  <!-- Main layout -->
  <main class="workspace">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">Chapters</div>
      <ul class="chapter-list" id="chapter-list"></ul>
    </nav>

    <!-- Content panel -->
    <article class="content-panel" id="content-panel">
      <div class="content-header">
        <h1 class="content-title" id="content-title"></h1>
      </div>
      <div class="markdown-body" id="markdown-body">
        <div class="loading-placeholder">Select a chapter from the sidebar</div>
      </div>
      <nav class="chapter-nav" id="chapter-nav" style="display: none;">
        <button id="btn-prev">← Previous Chapter</button>
        <button id="btn-next">Next Chapter →</button>
      </nav>
    </article>

    <!-- Table of Contents -->
    <aside class="toc-panel" id="toc-panel">
      <div class="toc-title">On this page</div>
      <ul class="toc-list" id="toc-list"></ul>
    </aside>
  </main>

  <!-- Status bar -->
  <footer class="status-bar" id="status-bar">
    <span id="status-text">Ready</span>
  </footer>

  <script>
    (function() {
      // ── Config ──
      const MANIFEST_URL = 'chapters.json';   // adjust if needed
      const DEFAULT_CHAPTER_ID = null;        // auto‑select first

      // ── State ──
      let chapters = [];
      let activeChapterId = null;

      // ── DOM Elements ──
      const chapterList = document.getElementById('chapter-list');
      const contentTitle = document.getElementById('content-title');
      const markdownBody = document.getElementById('markdown-body');
      const statusText = document.getElementById('status-text');
      const contentPanel = document.getElementById('content-panel');
      const progressBar = document.getElementById('progress-bar');
      const tocList = document.getElementById('toc-list');
      const chapterNav = document.getElementById('chapter-nav');
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');

      // ── Initialize ──
      async function init() {
        try {
          statusText.textContent = 'Loading manifest…';
          const resp = await fetch(MANIFEST_URL);
          if (!resp.ok) throw new Error(`Manifest fetch failed: ${resp.status}`);
          chapters = await resp.json();
          if (!chapters.length) throw new Error('No chapters found in manifest');
          renderSidebar();
          // Load chapter from URL hash, or fallback to first
          const hash = window.location.hash.replace('#', '');
          const targetChapter = chapters.find(c => c.id === hash) || chapters[0];
          loadChapter(targetChapter.id);
          // Listen to hash changes
          window.addEventListener('hashchange', onHashChange);
          statusText.textContent = `${chapters.length} chapter(s) loaded`;
        } catch (err) {
          markdownBody.innerHTML = `<div class="loading-placeholder">⚠ ${err.message}</div>`;
          statusText.textContent = 'Error loading manifest';
          console.error(err);
        }
      }

      // ── Render sidebar ──
      function renderSidebar() {
        chapterList.innerHTML = '';
        chapters.forEach(ch => {
          const item = document.createElement('li');
          item.className = 'chapter-item';
          item.innerHTML = `
            <a href="#${ch.id}" class="chapter-link" data-id="${ch.id}">${ch.title}</a>
            ${ch.description ? `<span class="chapter-desc">${ch.description}</span>` : ''}
          `;
          chapterList.appendChild(item);
        });
      }

      // ── Load a chapter by ID ──
      async function loadChapter(id) {
        const chapter = chapters.find(c => c.id === id);
        if (!chapter) return;

        activeChapterId = chapter.id;
        window.location.hash = `#${chapter.id}`;
        updateActiveLink();

        contentTitle.textContent = chapter.title;
        markdownBody.innerHTML = '<div class="loading-placeholder">Loading chapter…</div>';
        statusText.textContent = `Fetching: ${chapter.file}`;

        try {
          const resp = await fetch(chapter.file);
          if (!resp.ok) throw new Error(`Failed to load ${chapter.file} (${resp.status})`);
          const markdown = await resp.text();
          const html = marked.parse(markdown);
          
          // Reset fade-in
          markdownBody.classList.remove('loaded');
          
          markdownBody.innerHTML = html;
          
          // Math rendering
          if (window.renderMathInElement) {
            window.renderMathInElement(markdownBody, {
              delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
              ],
              throwOnError: false
            });
          }

          // Build TOC
          buildTOC();

          // Render Prev/Next buttons
          updateChapterNav();

          // Trigger fade-in
          setTimeout(() => { markdownBody.classList.add('loaded'); }, 50);
          
          // Reset scroll and progress
          contentPanel.scrollTop = 0;
          updateProgress();

          statusText.textContent = `Displaying: ${chapter.title}`;
        } catch (err) {
          markdownBody.innerHTML = `<div class="loading-placeholder">⚠ ${err.message}</div>`;
          statusText.textContent = 'Error loading chapter';
          console.error(err);
        }
      }

      // ── UI helpers ──
      function buildTOC() {
        tocList.innerHTML = '';
        const headings = markdownBody.querySelectorAll('h2, h3');
        if (headings.length === 0) {
          tocList.innerHTML = '<li><span class="toc-link" style="color:var(--text-tertiary)">No headings</span></li>';
          return;
        }

        headings.forEach((heading, index) => {
          if (!heading.id) {
            heading.id = 'heading-' + index;
          }
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = '#' + heading.id;
          a.textContent = heading.textContent;
          a.className = 'toc-link';
          if (heading.tagName.toLowerCase() === 'h3') {
            a.classList.add('toc-h3');
          }
          
          a.addEventListener('click', (e) => {
            e.preventDefault();
            heading.scrollIntoView({ behavior: 'smooth' });
          });

          li.appendChild(a);
          tocList.appendChild(li);
        });
      }

      function updateChapterNav() {
        const currentIndex = chapters.findIndex(c => c.id === activeChapterId);
        if (currentIndex === -1) {
          chapterNav.style.display = 'none';
          return;
        }
        
        chapterNav.style.display = 'flex';
        
        const prevChapter = chapters[currentIndex - 1];
        const nextChapter = chapters[currentIndex + 1];

        if (prevChapter) {
          btnPrev.disabled = false;
          btnPrev.textContent = `← ${prevChapter.title}`;
          btnPrev.onclick = () => loadChapter(prevChapter.id);
        } else {
          btnPrev.disabled = true;
          btnPrev.textContent = '← Previous';
          btnPrev.onclick = null;
        }

        if (nextChapter) {
          btnNext.disabled = false;
          btnNext.textContent = `${nextChapter.title} →`;
          btnNext.onclick = () => loadChapter(nextChapter.id);
        } else {
          btnNext.disabled = true;
          btnNext.textContent = 'Next →';
          btnNext.onclick = null;
        }
      }

      function updateProgress() {
        const scrollTop = contentPanel.scrollTop;
        const scrollHeight = contentPanel.scrollHeight;
        const clientHeight = contentPanel.clientHeight;
        const maxScroll = scrollHeight - clientHeight;
        
        if (maxScroll > 0) {
          const progress = (scrollTop / maxScroll) * 100;
          progressBar.style.width = `${progress}%`;
        } else {
          progressBar.style.width = '100%';
        }
      }
      
      // Scroll listener for progress bar
      contentPanel.addEventListener('scroll', updateProgress);

      function updateActiveLink() {
        document.querySelectorAll('.chapter-link').forEach(link => {
          const id = link.getAttribute('data-id');
          if (id === activeChapterId) {
            link.classList.add('active');
          } else {
            link.classList.remove('active');
          }
        });
      }

      function onHashChange() {
        const hash = window.location.hash.replace('#', '');
        if (hash && chapters.some(c => c.id === hash)) {
          loadChapter(hash);
        }
      }

      // ── Delegate clicks on sidebar ──
      chapterList.addEventListener('click', (e) => {
        const link = e.target.closest('.chapter-link');
        if (!link) return;
        e.preventDefault();
        const id = link.getAttribute('data-id');
        if (id) loadChapter(id);
      });

      // Start everything
      init();
    })();
  </script>
</body>
</html>
