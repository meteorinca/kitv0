<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Log – Articles</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

  <script src="app.js" defer></script>
</head>
<body>
  <header class="top-nav">
    <div class="nav-brand">
      <span class="nav-logo">📖</span>
      <span class="nav-title">Mission Log</span>
      <span class="nav-subtitle">Articles & Notes</span>
    </div>
    <div></div>
  </header>

  <main class="workspace">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">Chapters</div>
      <ul class="chapter-list" id="chapter-list"></ul>
    </nav>

    <article class="content-panel" id="content-panel">
      <div class="content-header">
        <h1 class="content-title" id="content-title"></h1>
      </div>

      <div class="markdown-body" id="markdown-body">
        <div class="loading-placeholder">Select a chapter from the sidebar</div>
      </div>
      <nav class="chapter-nav" id="chapter-nav" style="display: none;">
        <button id="btn-prev">← Previous Chapter</button>
        <button id="btn-next">Next Chapter →</button>
      </nav>
    </article>

    <!-- Table of Contents -->
    <aside class="toc-panel" id="toc-panel">
      <div class="toc-title">On this page</div>
      <ul class="toc-list" id="toc-list"></ul>
    </aside>
  </main>

  <footer class="status-bar" id="status-bar">
    <span id="status-text">Ready</span>
  </footer>
</body>
</html>
